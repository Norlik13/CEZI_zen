# docker-compose.prod.yml — Environnement de pull d'image (dev ou production)
# Usage : ENV_FILE=.env.prod docker compose -f docker-compose.prod.yml up -d
#         ENV_FILE=.env.dev  docker compose -f docker-compose.prod.yml up -d
#
# No reverse proxy for now (nginx removed) — gunicorn is exposed directly on
# the host. Re-add nginx later once there's a real domain + TLS certs and a
# need for it (static file serving, security headers, etc).

services:
  web:
    image: ghcr.io/norlik13/cesizen:${IMAGE_TAG:-latest}
    restart: unless-stopped
    command: sh -c "python manage.py migrate --noinput && gunicorn CEZIZen.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120 --access-logfile - --error-logfile -"
    env_file:
      - ${ENV_FILE:-.env.prod}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mariadb:11
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-.env.prod}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
