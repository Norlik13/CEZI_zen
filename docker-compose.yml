# docker-compose.yml — Environnement de développement local
# Usage : docker compose up --build

services:
  web:
    build: .
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py seed_emotions 2>/dev/null || true &&
             python manage.py seed_legal_pages 2>/dev/null || true &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DJANGO_DEBUG=True

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    profiles:
      - email
