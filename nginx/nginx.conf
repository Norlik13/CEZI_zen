# HTTP-only for now — no real domain/TLS certs until a real server exists.
# Once you have a domain + certs, restore the 80->443 redirect and the
# "listen 443 ssl" server block with ssl_certificate/ssl_certificate_key.
server {
    listen 80;
    server_name cesizen.fr www.cesizen.fr;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "DENY" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    client_max_body_size 10M;

    location /static/ {
        alias /app/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass         http://web:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
