name: "🐛 Rapport de bug"
description: Signaler un dysfonctionnement dans CESIZen
title: "[BUG] "
labels: ["bug", "à qualifier"]

body:
  - type: dropdown
    id: severite
    attributes:
      label: Sévérité
      options:
        - "🔴 Bloquant critique — service totalement inaccessible"
        - "🟠 Bloquant fort — fonctionnalité majeure inutilisable"
        - "🟡 Majeur — service dégradé, contournement possible"
        - "🟢 Mineur — altération cosmétique, service opérationnel"
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: Module concerné
      options:
        - Comptes utilisateurs (inscription, connexion, profil)
        - Informations (articles, pages légales)
        - Tracker d'émotions (journal, rapport)
        - Back-office administration
        - Autre
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description du problème
    validations:
      required: true

  - type: textarea
    id: comportement_attendu
    attributes:
      label: Comportement attendu
    validations:
      required: true

  - type: textarea
    id: etapes
    attributes:
      label: Étapes pour reproduire
      placeholder: |
        1. Aller sur...
        2. Cliquer sur...
        3. Voir l'erreur...
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: URL concernée
      placeholder: "Ex : /tracker/add/"

  - type: dropdown
    id: environnement
    attributes:
      label: Environnement
      options:
        - Développement local
        - Staging
        - Production
    validations:
      required: true

  - type: input
    id: navigateur
    attributes:
      label: Navigateur et version
      placeholder: "Chrome 124, Firefox 125..."

  - type: textarea
    id: logs
    attributes:
      label: Logs ou message d'erreur
      render: text

  - type: checkboxes
    id: confirmation
    attributes:
      label: Vérifications préalables
      options:
        - label: Ce bug n'est pas déjà signalé dans les issues existantes
          required: true
