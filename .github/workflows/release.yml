name: Release

on:
  push:
    branches: [ master, develop ]

# Avoid overlapping releases if two pushes land close together.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── 1. Semantic versioning (python-semantic-release) ──────────────────────
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    permissions:
      contents: write      # create tags, GitHub releases, push the bump commit
    outputs:
      released: ${{ steps.release.outputs.released }}
      version:  ${{ steps.release.outputs.version }}
      tag:      ${{ steps.release.outputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0      # full history so PSR can find the last tag
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python Semantic Release
        id: release
        uses: python-semantic-release/python-semantic-release@v9
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

  # ── 2. Build & push the Docker image for the released version ──────────────
  docker:
    name: Build image Docker
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}   # build the exact released commit

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/cesizen
          tags: |
            type=raw,value=${{ needs.release.outputs.version }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max