name: Release

on:
  push:
    branches: [ master, develop ]

# Avoid overlapping releases if two pushes land close together.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── 1. Semantic versioning (python-semantic-release) ──────────────────────
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    permissions:
      contents: write      # create tags, GitHub releases, push the bump commit
    outputs:
      released: ${{ steps.release.outputs.released }}
      version:  ${{ steps.release.outputs.version }}
      tag:      ${{ steps.release.outputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0      # full history so PSR can find the last tag
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python Semantic Release
        id: release
        uses: python-semantic-release/python-semantic-release@v9
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

  # ── 2. Build & push Docker images ───────────────────────────────────────────
  # Runs on every push to develop/master regardless of whether a version was
  # actually bumped (e.g. a ci:/chore: commit alone doesn't bump, but we still
  # want a fresh dev/prod image to test/deploy). When a real release *did*
  # happen this run, the image also gets tagged with that semantic version.
  #
  # "latest" always tracks develop (the rolling dev build). master never gets
  # a floating tag — prod deploys must pin an explicit version, falling back
  # to a sha-based tag on pushes that didn't cut a release.

  # dev image — pushed to develop, floating tag "latest"
  docker-dev:
    name: Build dev image Docker
    needs: release
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.released == 'true' && needs.release.outputs.tag || github.sha }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/cesizen
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.release.outputs.version }},enable=${{ needs.release.outputs.released == 'true' }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # prod image — pushed to master, pinned version tag only (no floating tag)
  docker-prod:
    name: Build prod image Docker
    needs: release
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.released == 'true' && needs.release.outputs.tag || github.sha }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/cesizen
          tags: |
            type=raw,value=${{ needs.release.outputs.version }},enable=${{ needs.release.outputs.released == 'true' }}
            type=sha,enable=${{ needs.release.outputs.released != 'true' }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max