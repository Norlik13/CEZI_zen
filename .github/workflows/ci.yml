name: CI CESIZen

on:
  pull_request:
    branches: [ master, develop ]

env:
  PYTHON_VERSION: "3.13"

jobs:

  # ── 1. Install / Check / Test / SonarCloud ────────────────────────────────
  ci:
    name: Install · Check · Test · Sonar
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # required by SonarCloud for blame/history

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Django system check
        env:
          DJANGO_SETTINGS_MODULE: CEZIZen.settings
          DJANGO_SECRET_KEY: ci-test-key-not-for-production
          DJANGO_DEBUG: "True"
        run: python manage.py check

      - name: Run tests with coverage
        env:
          DJANGO_SETTINGS_MODULE: CEZIZen.settings
          DJANGO_SECRET_KEY: ci-test-key-not-for-production
          DJANGO_DEBUG: "True"
        run: |
          coverage run --source=accounts,infos,emotions,CEZIZen manage.py test --verbosity=2
          coverage xml

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ── 2. Lint ───────────────────────────────────────────────────────────────
  lint:
    name: Qualité du code (flake8)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - run: pip install flake8
      - run: flake8 accounts/ infos/ emotions/ CEZIZen/ --max-line-length=120 --extend-ignore=E501,W503 --exclude=migrations/,__pycache__/