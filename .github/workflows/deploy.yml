name: Deploy

# ─────────────────────────────────────────────────────────────────────────────
# CD — Deploy a published image (the "make a container out of it" step).
# Assumes the image was already built & pushed to ghcr.io by release.yml.
#
# dev ("latest") and prod (pinned version) are deployed with DISTINCT
# COMPOSE_PROJECT_NAME and HOST_PORT so they can coexist on the same
# self-hosted runner without one overwriting the other's containers/volumes.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy: 'latest' = current dev build, or a pinned prod version (e.g. 1.4.0)"
        required: true
        default: "latest"

jobs:
  deploy-local:
    name: Deploy locally (self-hosted)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Write env file and start containers
        env:
          IMAGE_TAG: ${{ github.event.inputs.image_tag }}
        run: |
          $ErrorActionPreference = "Stop"

          if ("${{ github.event.inputs.image_tag }}" -eq "latest") {
            $env:ENV_FILE = "$env:USERPROFILE\.env.dev"
            $env:COMPOSE_PROJECT_NAME = "cesizen-dev"
            $env:HOST_PORT = "8001"
            @'
          ${{ secrets.ENV_DEV_FILE }}
          '@ | Out-File -Encoding utf8 $env:ENV_FILE
          } else {
            $env:ENV_FILE = "$env:USERPROFILE\.env.prod"
            $env:COMPOSE_PROJECT_NAME = "cesizen-prod"
            $env:HOST_PORT = "8000"
            @'
          ${{ secrets.ENV_PROD_FILE }}
          '@ | Out-File -Encoding utf8 $env:ENV_FILE
          }

          Write-Output "Déploiement projet=$env:COMPOSE_PROJECT_NAME port=$env:HOST_PORT env=$env:ENV_FILE"

          docker compose -f docker-compose.prod.yml pull
          if ($LASTEXITCODE -ne 0) { throw "docker compose pull failed" }
          docker compose -f docker-compose.prod.yml up -d
          if ($LASTEXITCODE -ne 0) { throw "docker compose up failed" }
          docker image prune -f