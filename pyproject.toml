[tool.semantic_release]
# Where the human-readable version string lives (stamped on each release).
version_variables = ["CEZIZen/__init__.py:__version__"]
# Django app: nothing to build/package, so skip the build step.
build_command = ""
# Git tag format, e.g. v1.4.0
tag_format = "v{version}"
# [skip ci] keeps the release commit from re-triggering the Release workflow.
commit_message = "chore(release): {version} [skip ci]"
# Commit the version bump + changelog back to the release branch.
commit_author = "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"

# master -> final releases (1.4.0)
[tool.semantic_release.branches.master]
match = "master"
prerelease = false

# develop -> pre-releases (1.4.0-rc.1)
[tool.semantic_release.branches.develop]
match = "develop"
prerelease = true
prerelease_token = "rc"

[tool.semantic_release.changelog]
exclude_commit_patterns = [
    "chore(release):.*",
]

[tool.semantic_release.commit_parser_options]
# Conventional Commits: which types trigger which bump.
allowed_tags = ["feat", "fix", "perf", "refactor", "docs", "style", "test", "build", "ci", "chore"]
minor_tags = ["feat"]
patch_tags = ["fix", "perf"]